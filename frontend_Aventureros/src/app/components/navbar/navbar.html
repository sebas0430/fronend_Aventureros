<nav class="sidebar" [class.collapsed]="isCollapsed()">
  <div class="sidebar-header">
    <div class="sidebar-brand" *ngIf="!isCollapsed()">
      <div class="brand-icon">🏢</div>
      <span class="brand-name">{{ nombreEmpresa() }}</span>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()" title="Toggle Sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="sidebar-content">
    <div class="nav-section">
      <a routerLink="/empleados" class="nav-link" routerLinkActive="active" title="Equipo">
        <span class="nav-icon">👥</span>
        <span class="nav-text" *ngIf="!isCollapsed()">Equipo</span>
      </a>
      @if (usuarioLogueado()?.rol === 'ADMINISTRADOR_EMPRESA') {
        <a routerLink="/pools" class="nav-link" routerLinkActive="active" title="Pools">
          <span class="nav-icon">🏢</span>
          <span class="nav-text" *ngIf="!isCollapsed()">Pools</span>
        </a>
        <a routerLink="/roles-pool" class="nav-link" routerLinkActive="active" title="Roles Pool">
          <span class="nav-icon">🛡️</span>
          <span class="nav-text" *ngIf="!isCollapsed()">Roles Pool</span>
        </a>
      }
      <a routerLink="/procesos" class="nav-link" routerLinkActive="active" title="Procesos">
        <span class="nav-icon">📋</span>
        <span class="nav-text" *ngIf="!isCollapsed()">Procesos</span>
      </a>
      <a routerLink="/roles-proceso" class="nav-link" routerLinkActive="active" title="Roles Proceso">
        <span class="nav-icon">🔑</span>
        <span class="nav-text" *ngIf="!isCollapsed()">Roles Proceso</span>
      </a>
      <a routerLink="/lanes" class="nav-link" routerLinkActive="active" title="Lanes">
        <span class="nav-icon">🛣️</span>
        <span class="nav-text" *ngIf="!isCollapsed()">Lanes</span>
      </a>
      <a routerLink="/mensajes" class="nav-link" routerLinkActive="active" title="Mensajes">
        <span class="nav-icon">💬</span>
        <span class="nav-text" *ngIf="!isCollapsed()">Mensajes</span>
      </a>
      <a routerLink="/conectores" class="nav-link" routerLinkActive="active" title="Conectores">
        <span class="nav-icon">🔌</span>
        <span class="nav-text" *ngIf="!isCollapsed()">Conectores</span>
      </a>
    </div>
  </div>

  @if (usuarioLogueado()) {
    <div class="sidebar-footer">
      <div class="user-profile" *ngIf="!isCollapsed()">
        <div class="user-avatar-sm">{{ getInitials(usuarioLogueado()!.correo) }}</div>
        <div class="user-info">
          <span class="user-email">{{ usuarioLogueado()!.correo }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" id="btn-logout" [title]="isCollapsed() ? 'Salir' : ''">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-text" *ngIf="!isCollapsed()">Salir</span>
      </button>
    </div>
  }
</nav>
