<div class="configuracion-empresa-container">
  <h1>Configuración de la Empresa</h1>

  <form [formGroup]="form" (ngSubmit)="actualizar()">
    <div class="form-group">
      <label for="nombre">Nombre de la Empresa:</label>
      <input
        id="nombre"
        type="text"
        formControlName="nombre"
        placeholder="Ingrese el nombre de la empresa"
        class="form-control"
        required
      />
      <div
        *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched"
        class="error-message"
      >
        El nombre de la empresa es requerido
      </div>
    </div>

    <div class="form-group">
      <label for="nit">NIT:</label>
      <input
        id="nit"
        type="text"
        formControlName="nit"
        placeholder="Ingrese el NIT"
        class="form-control"
        required
      />
      <div
        *ngIf="form.get('nit')?.invalid && form.get('nit')?.touched"
        class="error-message"
      >
        El NIT es requerido
      </div>
    </div>

    <button
      type="submit"
      [disabled]="form.invalid"
      class="btn-submit"
    >
      Actualizar Empresa
    </button>
  </form>
</div>
